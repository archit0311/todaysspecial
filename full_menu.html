  <script>
    let fullData = [];
    let activeCategory = "All";
    let scrollObserver = null;

    const menuContainer = document.getElementById("menu");
    const searchInput = document.getElementById("searchInput");

    function slugify(text) {
      return text.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
    }

    async function getMenuData() {
      try {
        const response = await fetch("full_menu.json");

        if (!response.ok) {
          throw new Error(`Could not load full_menu.json (${response.status})`);
        }

        return await response.json();
      } catch (error) {
        const embeddedData = document.getElementById("menuData").textContent.trim();

        if (!embeddedData) {
          throw error;
        }

        return JSON.parse(embeddedData);
      }
    }

    async function loadMenu() {
      try {
        const data = await getMenuData();

        if (!Array.isArray(data.Menu)) {
          throw new Error('Menu data must contain a "Menu" array');
        }

        fullData = data.Menu;
        renderCategories(fullData);
        renderMenu(fullData);
        setupScrollSpy();
      } catch (error) {
        menuContainer.innerHTML = `
          <div class="notice">
            Menu data could not be loaded. Please check that full_menu.json contains valid menu data.
          </div>
        `;
        console.error(error);
      }
    }

    function renderMenu(menuData) {
      menuContainer.innerHTML = "";

      menuData.forEach(category => {
        const catDiv = document.createElement("div");
        catDiv.className = "category";
        catDiv.id = `category-${slugify(category.Category)}`;

        const title = document.createElement("h2");
        title.textContent = category.Category;
        catDiv.appendChild(title);

        if (category.Description) {
          const description = document.createElement("p");
          description.className = "desc";
          description.textContent = category.Description;
          catDiv.appendChild(description);
        }

        if (category.Subcategories) {
          category.Subcategories.forEach(sub => {
            const subDiv = document.createElement("div");
            subDiv.className = "subcategory";

            const subTitle = document.createElement("h3");
            subTitle.textContent = sub.Name;
            subDiv.appendChild(subTitle);

            sub.Items.forEach(item => {
              subDiv.appendChild(createItem(item));
            });

            catDiv.appendChild(subDiv);
          });
        }

        if (category.Items) {
          category.Items.forEach(item => {
            catDiv.appendChild(createItem(item));
          });
        }

        menuContainer.appendChild(catDiv);
      });
    }

    function createItem(item) {
     
  const div = document.createElement("div");
  div.className = "item";

  // ✅ header (name + price split)
  const header = document.createElement("div");
  header.className = "item-header";

  const name = document.createElement("div");
  name.className = "item-name";
  name.textContent = item.Name;

  const price = document.createElement("div");
  price.className = "price";

  if (item.Price) {
    price.innerHTML = `₹${item.Price}`;
  } else if (item.Variants) {
    price.innerHTML = item.Variants
      .map(v => `${v.Size} ₹${v.Price}`)
      .join(" | ");
  }

  header.appendChild(name);
  header.appendChild(price);

  // description
  const desc = document.createElement("div");
  desc.className = "desc";
  desc.textContent = item.Description || "";

  // diet badges
  const diet = document.createElement("div");
  diet.className = "diet";

  let badges = "";
  if (item.Customizable?.Jain) {
    badges += '<span class="diet-badge">J</span>';
  }
  if (item.Customizable?.Swaminarayan) {
    badges += '<span class="diet-badge">S</span>';
  }

  diet.innerHTML = badges;

  // final structure
  div.appendChild(header);
  div.appendChild(desc);
  div.appendChild(diet);

  return div;
}
    

    function itemMatches(item, query) {
      return item.Name.toLowerCase().includes(query) ||
        (item.Description && item.Description.toLowerCase().includes(query)) ||
        (item.Tags && item.Tags.some(tag => tag.toLowerCase().includes(query)));
    }

    searchInput.addEventListener("input", function () {
      const query = this.value.trim().toLowerCase();

      if (!query) {
        activeCategory = "All";
        renderMenu(fullData);
        renderCategories(fullData);
        setupScrollSpy();
        return;
      }

      const filtered = fullData.map(category => {
        const newCategory = { ...category };

        if (category.Items) {
          newCategory.Items = category.Items.filter(item => itemMatches(item, query));
        }

        if (category.Subcategories) {
          newCategory.Subcategories = category.Subcategories.map(sub => {
            const newSub = { ...sub };
            newSub.Items = sub.Items.filter(item => itemMatches(item, query));
            return newSub;
          }).filter(sub => sub.Items.length > 0);
        }

        return newCategory;
      }).filter(cat =>
        (cat.Items && cat.Items.length > 0) ||
        (cat.Subcategories && cat.Subcategories.length > 0)
      );

      renderMenu(filtered);
      setupScrollSpy();
    });

    function renderCategories(menuData) {
      const bar = document.getElementById("categoryBar");
      bar.innerHTML = "";

      const categories = ["All", ...menuData.map(c => c.Category)];

      categories.forEach(cat => {
        const btn = document.createElement("button");
        btn.textContent = cat;

        if (cat === activeCategory) {
          btn.classList.add("active");
        }

        btn.onclick = () => {
          activeCategory = cat;

          if (cat === "All") {
            window.scrollTo({ top: 0, behavior: "smooth" });
          } else {
            const el = document.getElementById(`category-${slugify(cat)}`);

            if (el) {
              const headerOffset = document.getElementById("topBar").offsetHeight;
              const elementPosition = el.getBoundingClientRect().top + window.pageYOffset;
              const offsetPosition = elementPosition - headerOffset - 10;

              window.scrollTo({
                top: offsetPosition,
                behavior: "smooth"
              });
            }
          }

          renderCategories(fullData);
        };

        bar.appendChild(btn);
      });
    }

    function setupScrollSpy() {
      if (scrollObserver) {
        scrollObserver.disconnect();
      }

      const sections = document.querySelectorAll(".category");

      scrollObserver = new IntersectionObserver(
        entries => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              activeCategory = entry.target.querySelector("h2").textContent;
              renderCategories(fullData);
            }
          });
        },
        {
          rootMargin: "-100px 0px -60% 0px",
          threshold: 0
        }
      );

      sections.forEach(section => scrollObserver.observe(section));
    }

    loadMenu();
  </script>
</body>
</html>
